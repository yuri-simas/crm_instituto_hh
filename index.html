<style>
:root{
  --bg:#FBF4F4;
  --surface:#FFFFFF;
  --ink:#6E3A3D;
  --ink-2:#8A4A4E;
  --ink-soft:#A9807F;
  --border:#EFDBDC;
  --gold:#C9787C;
  --gold-bg:#F7E4E4;
  --teal:#A85A5E;
  --teal-bg:#F3E0E1;
  --danger:#B0413F;
  --danger-bg:#F8E5E4;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;color:var(--ink);margin:0;}
.mono{font-family:'IBM Plex Mono',monospace;}
#app{display:flex;min-height:100vh;}

/* Sidebar */
#sidebar{width:220px;flex-shrink:0;background:var(--ink);color:#EDEFF7;display:flex;flex-direction:column;padding:22px 0;}
#sidebar .brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:12px;}
#sidebar .brand h1{color:#fff;font-size:19px;}
#sidebar .brand p{margin:4px 0 0;font-size:11.5px;color:#E5C4C5;}
.navitem{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;color:#DFC0C1;font-size:13.5px;border-left:3px solid transparent;transition:.15s;}
.navitem:hover{background:rgba(255,255,255,.08);color:#fff;}
.navitem.active{background:rgba(255,255,255,.11);color:#fff;border-left-color:#E3A3A6;}
.navitem .dot{width:6px;height:6px;border-radius:50%;background:#9C6A6D;flex-shrink:0;}
.navitem.active .dot{background:var(--gold);}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:5;}
#topbar h2{font-size:20px;}
#topbar .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.filterbar{display:flex;align-items:center;gap:8px;}
.filterbar label{font-size:12px;color:var(--ink-soft);}
#content{padding:26px 28px 60px;}

/* form elements */
select,input,textarea{
  font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink);
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:#fff;
}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-bg);}
label.field-label{font-size:12px;color:var(--ink-soft);margin-bottom:4px;display:block;}

button{font-family:'Inter',sans-serif;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--ink);padding:9px 14px;transition:.15s;}
button:hover{border-color:var(--ink-soft);}
button.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
button.primary:hover{background:var(--ink-2);}
button.gold{background:var(--gold);color:#fff;border-color:var(--gold);}
button.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);padding:5px 8px;}
button.ghost:hover{background:var(--bg);color:var(--ink);}
button.danger-ghost{background:transparent;border-color:transparent;color:var(--danger);padding:5px 8px;}
button.danger-ghost:hover{background:var(--danger-bg);}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-head h3{font-size:16px;}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--border);}
tbody td{padding:11px 10px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle;}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}
.empty-row td{text-align:center;color:var(--ink-soft);padding:28px 10px;font-style:normal;}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.b-novo{background:#EDEFF7;color:#535C82;}
.b-agendada{background:var(--teal-bg);color:var(--teal);}
.b-realizada{background:#F3DEDF;color:#7A3336;}
.b-noshow{background:var(--danger-bg);color:var(--danger);}
.b-fechado{background:var(--gold-bg);color:var(--gold);}
.b-perdido{background:#F0F0F0;color:#888;}
.b-cancelada{background:#F0F0F0;color:#888;}

/* metric cards */
.grid-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.metric .label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
.metric .value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:500;margin-top:6px;color:var(--ink);}
.metric .value.gold{color:var(--gold);}
.metric .value.teal{color:var(--teal);}
.metric .value.danger{color:var(--danger);}

.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:900px){.grid2{grid-template-columns:1fr;}}

/* funnel */
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.funnel-label{width:150px;font-size:12.5px;color:var(--ink-soft);flex-shrink:0;}
.funnel-track{flex:1;background:#EEF0F6;border-radius:6px;height:26px;position:relative;overflow:hidden;}
.funnel-fill{height:100%;background:var(--teal);border-radius:6px;transition:width .4s;}
.funnel-val{width:44px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink);flex-shrink:0;}

/* bar chart (payment) */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{width:130px;font-size:12.5px;color:var(--ink-2);flex-shrink:0;}
.bar-track{flex:1;background:#EEF0F6;border-radius:6px;height:18px;position:relative;}
.bar-fill{height:100%;background:var(--gold);border-radius:6px;}
.bar-val{width:90px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);flex-shrink:0;}

/* modal */
#modal-overlay{position:fixed;inset:0;background:rgba(30,42,74,.4);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
#modal-overlay.open{display:flex;}
#modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:24px 26px;}
#modal h3{font-size:17px;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field select,.field input,.field textarea{width:100%;}
.checkgrid{display:flex;flex-wrap:wrap;gap:8px;}
.checkpill{border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--ink-2);user-select:none;}
.checkpill.on{background:var(--ink);color:#fff;border-color:var(--ink);}
#modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.pill-note{background:var(--teal-bg);color:var(--teal);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:18px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
.loading{padding:60px;text-align:center;color:var(--ink-soft);}

/* login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px 30px;width:100%;max-width:360px;text-align:center;}
.login-card .field{text-align:left;}
.login-card h1{font-size:20px;margin-bottom:6px;color:var(--ink);}
.login-sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 20px;}
.login-error{color:var(--danger);font-size:12.5px;min-height:16px;margin-top:4px;}
.login-hint{font-size:11.5px;color:var(--ink-soft);margin-top:14px;text-align:center;}

/* sidebar footer / user */
#sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,.12);}
.user-chip{font-size:12px;color:#EFDADB;margin-bottom:8px;}
.user-chip .role{display:block;font-size:10.5px;color:#C79A9B;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.sidebar-link{display:block;font-size:12px;color:#DFC0C1;cursor:pointer;padding:4px 0;}
.sidebar-link:hover{color:#fff;}
.storage-tag{font-size:10.5px;padding:4px 8px;border-radius:6px;margin-bottom:10px;display:inline-block;}
.storage-tag.cloud{background:rgba(255,255,255,.12);color:#F0D6D7;}
.storage-tag.local{background:rgba(255,255,255,.12);color:#F0D6D7;}
.storage-tag.error{background:var(--danger);color:#fff;}

.brand-mark{width:46px;height:46px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:7px;margin-bottom:10px;}
.brand-mark img{width:100%;height:100%;object-fit:contain;}
.login-logo{width:64px;height:64px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.login-logo img{width:100%;height:100%;object-fit:contain;}
</style>
</head>

async function publicUrl(path){
  if(!path) return null;
  const {data, error} = await sb.storage.from('contracts').createSignedUrl(path, 60*60*24);
  return error ? null : data.signedUrl;
}

const AUTH_EMAIL_DOMAIN = 'instituto-hh.local';
function loginToEmail(login){ return `${login.toLowerCase()}@${AUTH_EMAIL_DOMAIN}`; }
async function adminUsersFn(payload){
  const { data: sessionData } = await sb.auth.getSession();
  const token = sessionData?.session?.access_token;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-users`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${token||SUPABASE_ANON_KEY}` },
    body: JSON.stringify(payload),
  });
  const json = await res.json();
  if(!res.ok) throw new Error(json.error||'Erro na operação de usuário.');
  return json;
}

const LEAD_STATUS = ['Novo','Reunião Agendada','Reunião Realizada','No-show','Fechado','Perdido'];
const MEETING_STATUS = ['Agendada','Realizada','No-show','Cancelada'];

  'Novo':'b-novo','Reunião Agendada':'b-agendada','Reunião Realizada':'b-realizada',

  'Agendada':'b-agendada','Realizada':'b-realizada','Cancelada':'b-cancelada'
}[s] || 'b-novo');

function maskDocument(input){
  let v = input.value.replace(/\D/g,'').slice(0,14);
  if(v.length<=11){
    v = v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  } else {
    v = v.replace(/(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
  }
  input.value = v;
}

function maskCPF(input){
  let v = input.value.replace(/\D/g,'').slice(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  input.value = v;
}

function maskCEP(input){
  let v = input.value.replace(/\D/g,'').slice(0,8);
  v = v.replace(/(\d{5})(\d{1,3})$/,'$1-$2');
  input.value = v;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtCurrency(v){return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtDate(d){ if(!d) return '—'; const parts=d.split('-'); return parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:d;}
function courseName(id){ const c=state.courses.find(c=>c.id===id); return c?c.name:'—';}
function closerName(id){ const c=state.closers.find(c=>c.id===id); return c?c.name:'—';}
function leadName(id){ const l=state.leads.find(l=>l.id===id); return l?l.name:'—';}
function leadCourseIds(id){ const l=state.leads.find(l=>l.id===id); return l?(l.courseIds||[]):[];}
function paymentName(id){ const p=state.paymentMethods.find(p=>p.id===id); return p?p.name:'—';}

  return {

    paymentMethods: [
      {id:uid(), name:'Pix'},
      {id:uid(), name:'Cartão de Crédito'},
      {id:uid(), name:'Cartão de Crédito Parcelado'},
      {id:uid(), name:'Boleto'},
    ],
    closers: [],
    students: [],
    leads: [],
    meetings: [],
    sales: [],
    users: [],
  };
}

async function rowToCourse(r){
  return { id:r.id, name:r.name, price:r.price,
    templateFile: r.template_file_path ? {name:r.template_file_name, size:r.template_file_size, path:r.template_file_path, dataUrl:await publicUrl(r.template_file_path)} : null };
}
async function rowToHistory(h){
  return { id:h.id, courseId:h.course_id, paymentMethod:h.payment_method, saleId:h.sale_id||undefined, date:h.date,
    contractFile: h.contract_file_path ? {name:h.contract_file_name, size:h.contract_file_size, path:h.contract_file_path, dataUrl:await publicUrl(h.contract_file_path)} : null };
}

async function loadState(){
  try{
    const [coursesR, paymentsR, closersR, usersR, leadsR, leadCoursesR, meetingsR, salesR, studentsR, historyR] = await Promise.all([
      sb.from('courses').select('*'),
      sb.from('payment_methods').select('*'),
      sb.from('closers').select('*'),
      sb.from('users').select('*'),
      sb.from('leads').select('*'),
      sb.from('lead_courses').select('*'),
      sb.from('meetings').select('*'),
      sb.from('sales').select('*'),
      sb.from('students').select('*'),
      sb.from('student_course_history').select('*'),
    ]);
    const results = [coursesR,paymentsR,closersR,usersR,leadsR,leadCoursesR,meetingsR,salesR,studentsR,historyR];
    const firstError = results.find(r=>r.error);
    if(firstError) throw firstError.error;

    state = {
      courses: await Promise.all(coursesR.data.map(rowToCourse)),
      paymentMethods: paymentsR.data.map(r=>({id:r.id, name:r.name})),
      closers: closersR.data.map(r=>({id:r.id, name:r.name, commissionPercent:r.commission_percent, acceleratorThreshold:r.accelerator_threshold, acceleratorPercent:r.accelerator_percent})),
      users: usersR.data.map(r=>({id:r.id, name:r.name, login:r.login, authUserId:r.auth_user_id, role:r.role, closerId:r.closer_id||''})),
      leads: leadsR.data.map(r=>({
        id:r.id, name:r.name, phone:r.phone, cityState:r.city_state, education:r.education, semester:r.semester,
        closerId:r.closer_id||'', dateAssigned:r.date_assigned, nextContactDate:r.next_contact_date, status:r.status, notes:r.notes,
        courseIds: leadCoursesR.data.filter(lc=>lc.lead_id===r.id).map(lc=>lc.course_id),
      })),
      meetings: meetingsR.data.map(r=>({id:r.id, leadId:r.lead_id, closerId:r.closer_id||'', scheduledDate:r.scheduled_date, status:r.status, notes:r.notes})),
      sales: salesR.data.map(r=>({id:r.id, studentName:r.student_name, leadId:r.lead_id, courseId:r.course_id, closerId:r.closer_id, value:r.value, paymentMethod:r.payment_method, date:r.date})),
      students: await Promise.all(studentsR.data.map(async r=>({
        id:r.id, name:r.name, phone:r.phone, email:r.email, cpf:r.cpf, professionalRegistration:r.professional_registration, cep:r.cep, address:r.address,
        courseHistory: await Promise.all(historyR.data.filter(h=>h.student_id===r.id).map(rowToHistory)),
      }))),
    };
  }catch(e){
    console.error('Falha ao carregar dados do Supabase', e);
    storageMode = 'error';
    state = defaultState();
    document.getElementById('login-hint').textContent = 'Não foi possível conectar ao Supabase. Verifique a URL/chave e recarregue a página.';
    document.getElementById('login-user').focus();
    return;
  }

  document.getElementById('login-user').focus();
}

async function attemptLogin(){
  const login = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!login || !pass){ errEl.textContent = 'Informe login e senha.'; return; }
  const {error: authErr} = await sb.auth.signInWithPassword({email: loginToEmail(login), password: pass});
  if(authErr){ errEl.textContent = 'Login ou senha incorretos.'; return; }
  await loadState();
  const {data:{user: authUser}} = await sb.auth.getUser();
  const profile = state.users.find(u=>u.authUserId===authUser.id);
  if(!profile){ errEl.textContent = 'Usuário autenticado, mas sem perfil no sistema. Fale com o administrador.'; await sb.auth.signOut(); return; }
  currentUser = profile;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  currentTab = 'dashboard';
  render();
}

async function logout(){
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
}

async function tryRestoreSession(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ document.getElementById('login-user').focus(); return; }
  await loadState();
  const profile = state.users.find(u=>u.authUserId===session.user.id);
  if(!profile){ await sb.auth.signOut(); document.getElementById('login-user').focus(); return; }
  currentUser = profile;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  currentTab = 'dashboard';
  render();
}

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('login-screen').style.display !== 'none'){
    attemptLogin();
  }
});

function switchTab(key){ currentTab = key; render(); }

function setCourseFilter(v){ courseFilter = v; render(); }

function renderCourseFilterOptions(){
  const sel = document.getElementById('course-filter');
  const opts = ['<option value="all">Todos os cursos</option>']
    .concat(state.courses.map(c=>`<option value="${c.id}" ${courseFilter===c.id?'selected':''}>${escapeHtml(c.name)}</option>`));
  sel.innerHTML = opts.join('');
  sel.value = courseFilter;
}

function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- filtered data helpers ---------- */
function scopeByRole(list){
  if(currentUser.role==='closer' && currentUser.closerId){
    return list.filter(x=>x.closerId===currentUser.closerId);
  }
  return list;
}
function filteredLeads(){
  let l = courseFilter==='all' ? state.leads : state.leads.filter(l=>(l.courseIds||[]).includes(courseFilter));
  if(leadNameFilter.trim()){
    const q = leadNameFilter.trim().toLowerCase();
    l = l.filter(x=>x.name.toLowerCase().includes(q));
  }
  return scopeByRole(l);
}
function setLeadNameFilter(v){
  leadNameFilter = v;
  const el = document.getElementById('lead-name-filter');
  const pos = el ? el.selectionStart : null;
  render();
  const el2 = document.getElementById('lead-name-filter');
  if(el2){ el2.focus(); if(pos!=null) el2.setSelectionRange(pos,pos); }
}
function leadEducationOptions(){
  const seen = new Map();
  state.leads.forEach(l=>{
    const v = (l.education||'').trim();
    if(v && !seen.has(v.toLowerCase())) seen.set(v.toLowerCase(), v);
  });
  return Array.from(seen.values()).sort((a,b)=>a.localeCompare(b,'pt-BR'));
}
function filteredMeetings(){ let m = courseFilter==='all' ? state.meetings : state.meetings.filter(m=>leadCourseIds(m.leadId).includes(courseFilter)); return scopeByRole(m); }
function filteredSales(){ let s = courseFilter==='all' ? state.sales : state.sales.filter(s=>s.courseId===courseFilter); return scopeByRole(s); }
function filteredStudents(){ return courseFilter==='all' ? state.students : state.students.filter(s=>(s.courseHistory||[]).some(ch=>ch.courseId===courseFilter)); }

/* ---------- render dispatcher ---------- */
function render(){
  renderNav();
  renderCourseFilterOptions();
  const titleMap = {dashboard:'Dashboard', students:'Alunas', leads:'Leads', meetings:'Reuniões',
    sales:'Vendas', contracts:'Contratos', commissions:'Comissionamento', courses:'Cursos', payments:'Formas de Pagamento', users:'Usuários e Acessos', backup:'Backup de Dados'};
  document.getElementById('page-title').textContent = titleMap[currentTab];
  document.getElementById('page-sub').textContent = courseFilter==='all' ? 'Todos os cursos' : courseName(courseFilter);
  const el = document.getElementById('content');
  if(currentTab==='dashboard') el.innerHTML = renderDashboard();
  else if(currentTab==='students') el.innerHTML = renderStudents();
  else if(currentTab==='leads') el.innerHTML = renderLeads();
  else if(currentTab==='meetings') el.innerHTML = renderMeetings();
  else if(currentTab==='sales') el.innerHTML = renderSales();
  else if(currentTab==='contracts') el.innerHTML = renderContracts();
  else if(currentTab==='commissions') el.innerHTML = renderCommissions();
  else if(currentTab==='courses') el.innerHTML = renderCourses();
  else if(currentTab==='payments') el.innerHTML = renderPayments();
  else if(currentTab==='users') el.innerHTML = renderUsers();
  else if(currentTab==='backup') el.innerHTML = renderBackup();
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const leads = filteredLeads();
  const meetings = filteredMeetings();
  const sales = filteredSales();

  const totalVendido = sales.reduce((a,s)=>a+Number(s.value||0),0);
  const qtdReunioes = meetings.filter(m=>['Agendada','Realizada','No-show'].includes(m.status)).length;
  const qtdRealizadas = meetings.filter(m=>m.status==='Realizada').length;
  const qtdNoShow = meetings.filter(m=>m.status==='No-show').length;
  const noShowRate = (qtdRealizadas+qtdNoShow) ? Math.round(qtdNoShow/(qtdRealizadas+qtdNoShow)*100) : 0;
  const conversao = leads.length ? Math.round(sales.length/leads.length*100) : 0;

  const funnelSteps = [
    {label:'Leads recebidos', value: leads.length},
    {label:'Reuniões agendadas', value: qtdReunioes},
    {label:'Reuniões realizadas', value: qtdRealizadas},
    {label:'Vendas fechadas', value: sales.length},
  ];
  const maxFunnel = Math.max(1, ...funnelSteps.map(f=>f.value));

  const byPayment = {};
  sales.forEach(s=>{ const n=paymentName(s.paymentMethod); byPayment[n]=(byPayment[n]||0)+Number(s.value||0); });
  const paymentEntries = Object.entries(byPayment).sort((a,b)=>b[1]-a[1]);
  const maxPay = Math.max(1, ...paymentEntries.map(e=>e[1]));

  const closerRows = state.closers.map(c=>{
    const cLeads = leads.filter(l=>l.closerId===c.id);
    const cMeetRealizadas = meetings.filter(m=>m.closerId===c.id && m.status==='Realizada').length;
    const cMeetNoShow = meetings.filter(m=>m.closerId===c.id && m.status==='No-show').length;
    const cSales = sales.filter(s=>s.closerId===c.id);
    const cValor = cSales.reduce((a,s)=>a+Number(s.value||0),0);
    const conv = cLeads.length ? Math.round(cSales.length/cLeads.length*100) : 0;
    return {name:c.name, leads:cLeads.length, realizadas:cMeetRealizadas, noshow:cMeetNoShow, vendas:cSales.length, valor:cValor, conv};
  }).sort((a,b)=>b.valor-a.valor);

  return `
    <div class="grid-metrics">
      <div class="metric"><div class="label">Total vendido</div><div class="value gold mono">${fmtCurrency(totalVendido)}</div></div>
      <div class="metric"><div class="label">Leads recebidos</div><div class="value mono">${leads.length}</div></div>
      <div class="metric"><div class="label">Reuniões realizadas</div><div class="value teal mono">${qtdRealizadas}</div></div>
      <div class="metric"><div class="label">Taxa de no-show</div><div class="value ${noShowRate>25?'danger':''} mono">${noShowRate}%</div></div>
      <div class="metric"><div class="label">Conversão lead → venda</div><div class="value mono">${conversao}%</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="section-head"><h3>Funil de vendas</h3></div>
        ${funnelSteps.map(f=>`
          <div class="funnel-row">
            <div class="funnel-label">${f.label}</div>
            <div class="funnel-track"><div class="funnel-fill" style="width:${Math.round(f.value/maxFunnel*100)}%"></div></div>
            <div class="funnel-val mono">${f.value}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="section-head"><h3>Vendas por forma de pagamento</h3></div>
        ${paymentEntries.length ? paymentEntries.map(([name,val])=>`
          <div class="bar-row">
            <div class="bar-label">${escapeHtml(name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxPay*100)}%"></div></div>
            <div class="bar-val mono">${fmtCurrency(val)}</div>
          </div>`).join('') : '<p style="color:var(--ink-soft);font-size:13px;">Nenhuma venda registrada ainda.</p>'}
      </div>
    </div>

    <div class="card">
      <div class="section-head"><h3>Desempenho por closer</h3></div>
      <table>
        <thead><tr><th>Closer</th><th>Leads</th><th>Reuniões realizadas</th><th>No-show</th><th>Vendas</th><th>Valor fechado</th><th>Conversão</th></tr></thead>
        <tbody>
        ${closerRows.length ? closerRows.map(r=>`
          <tr>
            <td style="font-weight:600;color:var(--ink);">${escapeHtml(r.name)}</td>
            <td>${r.leads}</td><td>${r.realizadas}</td><td>${r.noshow}</td><td>${r.vendas}</td>
            <td class="mono">${fmtCurrency(r.valor)}</td>
            <td><span class="badge b-fechado">${r.conv}%</span></td>
          </tr>`).join('') : `<tr class="empty-row"><td colspan="7">Cadastre closers para ver o desempenho.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function courseRowHtml(ch){
  if(!state.courses.length){
    return '<p style="color:var(--ink-soft);font-size:12.5px;">Cadastre cursos primeiro.</p>';
  }
  const courseId = ch.courseId, paymentId = ch.paymentMethod;
  return `<div class="course-row" data-chid="${ch.id||''}" style="display:flex;gap:8px;margin-bottom:8px;">
    <select class="row-course" style="flex:1;">${state.courses.map(c=>`<option value="${c.id}" ${courseId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}</select>
    <select class="row-payment" style="flex:1;">${state.paymentMethods.map(p=>`<option value="${p.id}" ${paymentId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
    <button type="button" class="ghost" onclick="this.closest('.course-row').remove()">Remover</button>
  </div>`;
}

function addCourseRow(){
  if(!state.courses.length){ alert('Cadastre um curso primeiro.'); return; }
  document.getElementById('f-course-rows').insertAdjacentHTML('beforeend', courseRowHtml({courseId:state.courses[0].id, paymentMethod:state.paymentMethods[0]?.id, id:''}));
}

async function saveStudent(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('Informe o nome da aluna.'); return; }
  const courseHistory = Array.from(document.querySelectorAll('#f-course-rows .course-row')).map(row=>{
    const chid = row.dataset.chid;
    const prev = chid ? editingCourseHistory.find(c=>c.id===chid) : null;
    return {
      id: prev ? prev.id : uid(),
      courseId: row.querySelector('.row-course').value,
      paymentMethod: row.querySelector('.row-payment').value,
      saleId: prev ? prev.saleId : undefined,
      date: prev ? prev.date : undefined,
      contractFile: prev ? (prev.contractFile||null) : null,
    };
  });
  const data = {
    id: editing ? editing.id : uid(),
    name, phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    cpf: document.getElementById('f-cpf').value.trim(),
    professionalRegistration: document.getElementById('f-registration').value.trim(),
    cep: document.getElementById('f-cep').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    courseHistory
  };
  const {error: studentErr} = await sb.from('students').upsert({
    id:data.id, name:data.name, phone:data.phone, email:data.email, cpf:data.cpf,
    professional_registration:data.professionalRegistration, cep:data.cep, address:data.address,
  });
  if(studentErr){ alert('Erro ao salvar aluna: '+studentErr.message); return; }

  const removedIds = editingCourseHistory.map(c=>c.id).filter(id=>!courseHistory.some(c=>c.id===id));
  if(removedIds.length){ await sb.from('student_course_history').delete().in('id', removedIds); }
  for(const ch of courseHistory){
    await sb.from('student_course_history').upsert({
      id:ch.id, student_id:data.id, course_id:ch.courseId||null, payment_method:ch.paymentMethod||null,
      sale_id: ch.saleId||null, date: ch.date||null,
      contract_file_path: ch.contractFile ? ch.contractFile.path : null,
      contract_file_name: ch.contractFile ? ch.contractFile.name : null,
      contract_file_size: ch.contractFile ? ch.contractFile.size : null,
    });
  }

  if(editing){ Object.assign(editing, data); } else { state.students.push(data); }
  closeModal(); render();
}

/* ---------- LEADS ---------- */

async function saveLead(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('Informe o nome do lead.'); return; }
  const courseIds = Array.from(document.querySelectorAll('#f-course-interest .checkpill.on')).map(el=>el.dataset.id);
  const data = {
    id: editing ? editing.id : uid(),
    name, phone: document.getElementById('f-phone').value.trim(),
    cityState: document.getElementById('f-citystate').value.trim(),
    education: document.getElementById('f-education').value.trim(),
    semester: document.getElementById('f-semester').value.trim(),
    courseIds,
    closerId: document.getElementById('f-closer').value,
    dateAssigned: document.getElementById('f-date').value,
    nextContactDate: document.getElementById('f-next').value,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  const {error: leadErr} = await sb.from('leads').upsert({
    id:data.id, name:data.name, phone:data.phone, city_state:data.cityState, education:data.education,
    semester:data.semester, closer_id:data.closerId||null, date_assigned:data.dateAssigned||null,
    next_contact_date:data.nextContactDate||null, status:data.status, notes:data.notes,
  });
  if(leadErr){ alert('Erro ao salvar lead: '+leadErr.message); return; }
  await sb.from('lead_courses').delete().eq('lead_id', data.id);
  if(courseIds.length){
    await sb.from('lead_courses').insert(courseIds.map(courseId=>({lead_id:data.id, course_id:courseId})));
  }
  if(editing){ Object.assign(editing, data); } else { state.leads.push(data); }
  closeModal(); render();
}

function fillFromLead(leadId){
  if(!leadId) return;
  const lead = state.leads.find(l=>l.id===leadId);
  if(!lead) return;
  document.getElementById('f-name').value = lead.name;
  if(lead.courseIds && lead.courseIds.length===1) document.getElementById('f-course').value = lead.courseIds[0];
}

async function saveSale(){
  const studentName = document.getElementById('f-name').value.trim();
  const value = parseFloat(document.getElementById('f-value').value)||0;
  if(!studentName){ alert('Informe o nome da aluna.'); return; }
  const leadId = document.getElementById('f-lead').value;
  const data = {
    id: editing ? editing.id : uid(),
    studentName, leadId: leadId||null,
    courseId: document.getElementById('f-course').value,
    closerId: document.getElementById('f-closer').value,
    value, paymentMethod: document.getElementById('f-payment').value,
    date: document.getElementById('f-date').value,
  };
  const {error} = await sb.from('sales').upsert({
    id:data.id, student_name:data.studentName, lead_id:data.leadId, course_id:data.courseId||null,
    closer_id:data.closerId||null, value:data.value, payment_method:data.paymentMethod||null, date:data.date||null,
  });
  if(error){ alert('Erro ao salvar venda: '+error.message); return; }
  if(editing){ Object.assign(editing, data); } else { state.sales.push(data); }
  if(leadId){
    const lead = state.leads.find(l=>l.id===leadId);
    if(lead){ lead.status = 'Fechado'; await sb.from('leads').update({status:'Fechado'}).eq('id', leadId); }
  }
  await upsertStudentFromSale(data, leadId);
  closeModal(); render();
}

async function upsertStudentFromSale(saleData, leadId){
  state.students.forEach(st=>{
    st.courseHistory = (st.courseHistory||[]).filter(ch=>ch.saleId!==saleData.id);
  });
  const lead = leadId ? state.leads.find(l=>l.id===leadId) : null;
  let student = state.students.find(st=>st.name.trim().toLowerCase()===saleData.studentName.trim().toLowerCase());
  let isNewStudent = false;
  if(!student){
    student = { id: uid(), name: saleData.studentName, phone: lead?lead.phone:'', email: '', cpf: '', professionalRegistration:'', cep:'', address:'', courseHistory: [] };
    state.students.push(student);
    isNewStudent = true;
  } else if(lead && !student.phone){
    student.phone = lead.phone;
  }
  if(!student.courseHistory) student.courseHistory = [];
  const historyEntry = { id: uid(), courseId: saleData.courseId, paymentMethod: saleData.paymentMethod, saleId: saleData.id, date: saleData.date, contractFile: null };
  student.courseHistory.push(historyEntry);

  await sb.from('student_course_history').delete().eq('sale_id', saleData.id);
  if(isNewStudent){
    const {error: stErr} = await sb.from('students').insert({
      id:student.id, name:student.name, phone:student.phone, email:student.email, cpf:student.cpf,
      professional_registration:student.professionalRegistration, cep:student.cep, address:student.address,
    });
    if(stErr) console.error('erro ao inserir aluna', stErr);
  } else if(lead){
    const {error: stErr} = await sb.from('students').update({phone:student.phone}).eq('id', student.id);
    if(stErr) console.error('erro ao atualizar aluna', stErr);
  }
  const {error: chErr} = await sb.from('student_course_history').insert({
    id:historyEntry.id, student_id:student.id, course_id:historyEntry.courseId||null, payment_method:historyEntry.paymentMethod||null,
    sale_id:historyEntry.saleId, date:historyEntry.date||null, contract_file_path:null, contract_file_name:null, contract_file_size:null,
  });
  if(chErr) console.error('erro ao inserir histórico de curso', chErr);
}

/* ---------- COMMISSIONS ---------- */
function renderCommissions(){
  const sales = filteredSales();
  const rows = state.closers.map(c=>{
    const cSales = sales.filter(s=>s.closerId===c.id);
    const total = cSales.reduce((a,s)=>a+Number(s.value||0),0);
    const base = Number(c.commissionPercent||0);
    const threshold = Number(c.acceleratorThreshold||0);
    const accel = Number(c.acceleratorPercent||0);
    let commission;
    if(threshold>0 && total>threshold && accel>0){
      commission = threshold*(base/100) + (total-threshold)*(accel/100);
    } else {
      commission = total*(base/100);
    }
    return {c, total, commission, qty: cSales.length};
  });
  return `
    ${toolbarHtml('Comissionamento','Novo closer','openCloserModal()')}
    <div class="pill-note">Comissão = percentual base sobre o total vendido. Se o acelerador estiver configurado e o total vendido ultrapassar a meta, o excedente é calculado com o percentual acelerado.</div>
    <div class="card">
      <table>
        <thead><tr><th>Closer</th><th>% base</th><th>Meta acelerador</th><th>% acelerado</th><th>Vendas</th><th>Total vendido</th><th>Comissão devida</th><th></th></tr></thead>
        <tbody>
        ${rows.length ? rows.map(r=>`
          <tr>
            <td style="font-weight:600;color:var(--ink);">${escapeHtml(r.c.name)}</td>
            <td class="mono">${r.c.commissionPercent||0}%</td>
            <td class="mono">${r.c.acceleratorThreshold?fmtCurrency(r.c.acceleratorThreshold):'—'}</td>
            <td class="mono">${r.c.acceleratorPercent?r.c.acceleratorPercent+'%':'—'}</td>
            <td>${r.qty}</td>
            <td class="mono">${fmtCurrency(r.total)}</td>
            <td class="mono" style="color:var(--gold);font-weight:600;">${fmtCurrency(r.commission)}</td>
            <td style="text-align:right;white-space:nowrap;">
              <button class="ghost" onclick="openCloserModal('${r.c.id}')">Editar</button>
              <button class="danger-ghost" onclick="deleteItem('closers','${r.c.id}')">Excluir</button>
            </td>
          </tr>`).join('') : `<tr class="empty-row"><td colspan="8">Nenhum closer cadastrado ainda.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

async function saveUser(){
  const name = document.getElementById('f-name').value.trim();
  const login = document.getElementById('f-login').value.trim().toLowerCase();
  const pass = document.getElementById('f-pass').value;
  if(!name || !login){ alert('Informe nome e login.'); return; }
  const dupe = state.users.find(u=>u.login.toLowerCase()===login && (!editing || u.id!==editing.id));
  if(dupe){ alert('Já existe um usuário com esse login.'); return; }
  const semAcesso = editing && !editing.authUserId;
  if((!editing || semAcesso) && pass.length<6){ alert('A senha deve ter pelo menos 6 caracteres.'); return; }
  if(editing && !semAcesso && pass && pass.length<6){ alert('A senha deve ter pelo menos 6 caracteres.'); return; }
  const role = document.getElementById('f-role').value;
  const closerId = role==='closer' ? document.getElementById('f-closer').value : '';
  try{
    if(!editing){
      await adminUsersFn({action:'create', name, login, password:pass, role, closerId});
    } else {
      const {error} = await sb.from('users').update({name, role, closer_id:closerId||null}).eq('id', editing.id);
      if(error) throw error;
      if(semAcesso) await adminUsersFn({action:'attachAuth', userId:editing.id, password:pass});
      else if(pass) await adminUsersFn({action:'resetPassword', userId:editing.id, password:pass});
    }
  }catch(e){ alert('Erro ao salvar usuário: '+(e.message||e)); return; }
  await loadState();
  closeModal(); render();
}

async function deleteUser(id){
  if(currentUser.id===id){ alert('Você não pode excluir o usuário com o qual está logado.'); return; }
  if(!confirm('Tem certeza que deseja excluir este usuário?')) return;
  try{ await adminUsersFn({action:'delete', userId:id}); }
  catch(e){ alert('Erro ao excluir usuário: '+(e.message||e)); return; }
  await loadState();
  render();
}

  return `

        <button class="primary" onclick="exportBackup()">Baixar backup (.json)</button>
      </div>

        <div class="section-head"><h3>Importar backup</h3></div>
        <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 14px;">Selecione um arquivo .json exportado anteriormente. <strong>Isso substitui todos os dados atuais.</strong></p>

function exportBackup(){
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url; a.download = `crm-instituto-hh-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importBackupFile(input){
  const file = input.files[0];
  if(!file) return;
  const text = await file.text();
  let parsed;
  try{ parsed = JSON.parse(text); }
  catch(e){ alert('Arquivo inválido. Selecione um backup .json exportado por este próprio CRM.'); input.value=''; return; }
  const requiredKeys = ['courses','paymentMethods','closers','students','leads','meetings','sales','users'];
  const missing = requiredKeys.filter(k=>!(k in parsed));
  if(missing.length){ alert('Este arquivo não parece ser um backup válido do CRM.'); input.value=''; return; }
  if(!confirm('Isso vai SUBSTITUIR todos os dados atuais pelos dados do backup selecionado. Essa ação não pode ser desfeita. Deseja continuar?')){ input.value=''; return; }

  const meBackup = JSON.parse(JSON.stringify(currentUser));
  if(!Array.isArray(parsed.users)) parsed.users = [];
  if(!parsed.users.find(u=>u.id===meBackup.id)) parsed.users.push(meBackup);

  try{
    for(const table of ['student_course_history','lead_courses','meetings','sales','students','leads','users','closers','courses','payment_methods']){
      const {error} = await sb.from(table).delete().neq('id', '__none__');
      if(error) throw error;
    }
    if((parsed.courses||[]).length){
      const {error} = await sb.from('courses').insert(parsed.courses.map(c=>({
        id:c.id, name:c.name, price:c.price||0,
        template_file_path: c.templateFile ? (c.templateFile.path||null) : null,
        template_file_name: c.templateFile ? (c.templateFile.name||null) : null,
        template_file_size: c.templateFile ? (c.templateFile.size||null) : null,
      })));
      if(error) throw error;
    }
    if((parsed.paymentMethods||[]).length){
      const {error} = await sb.from('payment_methods').insert(parsed.paymentMethods.map(p=>({id:p.id, name:p.name})));
      if(error) throw error;
    }
    if((parsed.closers||[]).length){
      const {error} = await sb.from('closers').insert(parsed.closers.map(c=>({
        id:c.id, name:c.name, commission_percent:c.commissionPercent||0,
        accelerator_threshold:c.acceleratorThreshold||0, accelerator_percent:c.acceleratorPercent||0,
      })));
      if(error) throw error;
    }
    if(parsed.users.length){
      const {error} = await sb.from('users').insert(parsed.users.map(u=>({
        id:u.id, name:u.name, login:u.login, role:u.role, closer_id:u.closerId||null, auth_user_id:u.authUserId||null,
      })));
      if(error) throw error;
    }
    if((parsed.leads||[]).length){
      const {error} = await sb.from('leads').insert(parsed.leads.map(l=>({
        id:l.id, name:l.name, phone:l.phone, city_state:l.cityState, education:l.education, semester:l.semester,
        closer_id:l.closerId||null, date_assigned:l.dateAssigned||null, next_contact_date:l.nextContactDate||null,
        status:l.status, notes:l.notes,
      })));
      if(error) throw error;
      const leadCourseRows = [];
      parsed.leads.forEach(l=>(l.courseIds||[]).forEach(courseId=>leadCourseRows.push({lead_id:l.id, course_id:courseId})));
      if(leadCourseRows.length){ const {error:lcErr} = await sb.from('lead_courses').insert(leadCourseRows); if(lcErr) throw lcErr; }
    }
    if((parsed.meetings||[]).length){
      const {error} = await sb.from('meetings').insert(parsed.meetings.map(m=>({
        id:m.id, lead_id:m.leadId, closer_id:m.closerId||null, scheduled_date:m.scheduledDate||null, status:m.status, notes:m.notes,
      })));
      if(error) throw error;
    }
    if((parsed.sales||[]).length){
      const {error} = await sb.from('sales').insert(parsed.sales.map(s=>({
        id:s.id, student_name:s.studentName, lead_id:s.leadId||null, course_id:s.courseId||null,
        closer_id:s.closerId||null, value:s.value||0, payment_method:s.paymentMethod||null, date:s.date||null,
      })));
      if(error) throw error;
    }
    if((parsed.students||[]).length){
      const {error} = await sb.from('students').insert(parsed.students.map(s=>({
        id:s.id, name:s.name, phone:s.phone, email:s.email, cpf:s.cpf,
        professional_registration:s.professionalRegistration, cep:s.cep, address:s.address,
      })));
      if(error) throw error;
      const historyRows = [];
      parsed.students.forEach(s=>(s.courseHistory||[]).forEach(ch=>historyRows.push({
        id:ch.id, student_id:s.id, course_id:ch.courseId||null, payment_method:ch.paymentMethod||null,
        sale_id:ch.saleId||null, date:ch.date||null,
        contract_file_path: ch.contractFile ? (ch.contractFile.path||null) : null,
        contract_file_name: ch.contractFile ? (ch.contractFile.name||null) : null,
        contract_file_size: ch.contractFile ? (ch.contractFile.size||null) : null,
      })));
      if(historyRows.length){ const {error:hErr} = await sb.from('student_course_history').insert(historyRows); if(hErr) throw hErr; }
    }
  }catch(e){
    alert('Erro ao importar backup: '+(e.message||e)+'. Recarregando os dados para conferir o estado atual.');
    input.value = '';
    await loadState();
    render();
    return;
  }

  await loadState();
  currentUser = state.users.find(u=>u.id===meBackup.id) || meBackup;
  input.value = '';
  const semAcesso = state.users.filter(u=>!u.authUserId && u.id!==currentUser.id);
  alert('Backup importado com sucesso.' + (semAcesso.length ? ` Atenção: ${semAcesso.length} usuário(s) do backup ficaram sem senha de acesso (login antigo não é mais compatível) — recrie o acesso deles em Usuários.` : ''));
  render();
}

function sanitizeFileName(name){
  return name.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9.\-]/g,'_');
}

async function uploadCourseTemplate(courseId, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > MAX_CONTRACT_BYTES){ alert('Arquivo muito grande. O limite é 1,5 MB.'); input.value=''; return; }
  const course = state.courses.find(c=>c.id===courseId);
  if(!course) return;
  const oldPath = course.templateFile ? course.templateFile.path : null;
  const path = `templates/${courseId}/${Date.now()}-${sanitizeFileName(file.name)}`;
  const {error: upErr} = await sb.storage.from('contracts').upload(path, file);
  if(upErr){ alert('Erro ao enviar arquivo: '+upErr.message); input.value=''; return; }
  const {error: dbErr} = await sb.from('courses').update({
    template_file_path: path, template_file_name: file.name, template_file_size: file.size,
  }).eq('id', courseId);
  if(dbErr){ alert('Erro ao salvar referência do arquivo: '+dbErr.message); input.value=''; return; }
  if(oldPath) await sb.storage.from('contracts').remove([oldPath]);
  course.templateFile = { name:file.name, size:file.size, path, dataUrl:await publicUrl(path) };
  render();
}

async function removeCourseTemplate(courseId){
  if(!confirm('Remover o modelo de contrato deste curso?')) return;
  const course = state.courses.find(c=>c.id===courseId);
  if(!course) return;
  const path = course.templateFile ? course.templateFile.path : null;
  const {error} = await sb.from('courses').update({template_file_path:null, template_file_name:null, template_file_size:null}).eq('id', courseId);
  if(error){ alert('Erro ao remover: '+error.message); return; }
  if(path) await sb.storage.from('contracts').remove([path]);
  course.templateFile = null;
  render();
}

async function uploadContractFor(studentId, chId, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > MAX_CONTRACT_BYTES){ alert('Arquivo muito grande. O limite é 1,5 MB.'); input.value=''; return; }
  const student = state.students.find(s=>s.id===studentId);
  if(!student) return;
  const ch = (student.courseHistory||[]).find(c=>c.id===chId);
  if(!ch) return;
  const oldPath = ch.contractFile ? ch.contractFile.path : null;
  const path = `contracts/${studentId}/${chId}/${Date.now()}-${sanitizeFileName(file.name)}`;
  const {error: upErr} = await sb.storage.from('contracts').upload(path, file);
  if(upErr){ alert('Erro ao enviar arquivo: '+upErr.message); input.value=''; return; }
  const {error: dbErr} = await sb.from('student_course_history').update({
    contract_file_path: path, contract_file_name: file.name, contract_file_size: file.size,
  }).eq('id', chId);
  if(dbErr){ alert('Erro ao salvar referência do arquivo: '+dbErr.message); input.value=''; return; }
  if(oldPath) await sb.storage.from('contracts').remove([oldPath]);
  ch.contractFile = { name:file.name, size:file.size, path, dataUrl:await publicUrl(path) };

}

async function removeContractFor(studentId, chId){
  if(!confirm('Remover o contrato anexado?')) return;
  const student = state.students.find(s=>s.id===studentId);
  if(!student) return;
  const ch = (student.courseHistory||[]).find(c=>c.id===chId);
  if(!ch) return;
  const path = ch.contractFile ? ch.contractFile.path : null;
  const {error} = await sb.from('student_course_history').update({contract_file_path:null, contract_file_name:null, contract_file_size:null}).eq('id', chId);
  if(error){ alert('Erro ao remover: '+error.message); return; }
  if(path) await sb.storage.from('contracts').remove([path]);
  ch.contractFile = null;
  render();
}

/* ---------- generic delete / modal control ---------- */
const TABLE_BY_COLLECTION = {
  students:'students', leads:'leads', meetings:'meetings', sales:'sales',
  closers:'closers', courses:'courses', paymentMethods:'payment_methods',
};

async function deleteItem(collection, id){
  if(!confirm('Tem certeza que deseja excluir este registro?')) return;
  if(collection==='sales'){
    await sb.from('student_course_history').delete().eq('sale_id', id);
    state.students.forEach(st=>{ st.courseHistory = (st.courseHistory||[]).filter(ch=>ch.saleId!==id); });
  }
  const {error} = await sb.from(TABLE_BY_COLLECTION[collection]).delete().eq('id', id);
  if(error){ alert('Erro ao excluir: '+error.message); return; }
  if(collection==='leads'){
    state.meetings = state.meetings.filter(m=>m.leadId!==id);
  }
  state[collection] = state[collection].filter(x=>x.id!==id);
  render();
}

function openModal(){ document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editing=null; }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') closeModal(); });

tryRestoreSession();
</script>
